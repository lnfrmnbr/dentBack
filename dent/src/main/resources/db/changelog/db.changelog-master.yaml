databaseChangeLog:
  - changeSet:
      id: 000-enable-uuid-extension
      author: dental-app
      changes:
        - sql:
            sql: |
              CREATE EXTENSION IF NOT EXISTS "pgcrypto";

  # =========================
  # CLINICS
  # =========================
  - changeSet:
      id: 001-create-clinics
      author: dental-app
      changes:
        - createTable:
            tableName: clinics
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: logo
                  type: text
              - column:
                  name: org_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: short_name
                  type: text
              - column:
                  name: contacts
                  type: text
              - column:
                  name: address
                  type: text
              - column:
                  name: email
                  type: text

  # =========================
  # DOCTORS
  # =========================
  - changeSet:
      id: 002-create-doctors
      author: dental-app
      changes:
        - createTable:
            tableName: doctors
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: clinic_id
                  type: uuid
              - column:
                  name: last_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: text
              - column:
                  name: patronymic
                  type: text
              - column:
                  name: role
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: birth_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: sex
                  type: char(1)

        - addForeignKeyConstraint:
            baseTableName: doctors
            baseColumnNames: clinic_id
            referencedTableName: clinics
            referencedColumnNames: id
            onDelete: SET NULL
            constraintName: fk_doctors_clinic

        - sql:
            sql: |
              ALTER TABLE doctors
              ADD CONSTRAINT chk_doctors_sex
              CHECK (sex IN ('M','F'));

        - createIndex:
            tableName: doctors
            indexName: idx_doctors_clinic_id
            columns:
              - column:
                  name: clinic_id

  # =========================
  # PATIENTS
  # =========================
  - changeSet:
      id: 003-create-patients
      author: dental-app
      changes:
        - createTable:
            tableName: patients
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: clinic_id
                  type: uuid
              - column:
                  name: full_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: birth_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: sex
                  type: char(1)
              - column:
                  name: email
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: phone_number
                  type: text
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: patients
            baseColumnNames: clinic_id
            referencedTableName: clinics
            referencedColumnNames: id
            onDelete: SET NULL
            constraintName: fk_patients_clinic

        - sql:
            sql: |
              ALTER TABLE patients
              ADD CONSTRAINT chk_patients_sex
              CHECK (sex IN ('M','F'));

        - createIndex:
            tableName: patients
            indexName: idx_patients_clinic_id
            columns:
              - column:
                  name: clinic_id

  # =========================
  # APPOINTMENTS
  # =========================
  - changeSet:
      id: 004-create-appointments
      author: dental-app
      changes:
        - createTable:
            tableName: appointments
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: doctor_id
                  type: uuid
              - column:
                  name: patient_id
                  type: uuid
              - column:
                  name: date
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: tags
                  type: text
              - column:
                  name: bop
                  type: numeric(5,2)
              - column:
                  name: russel
                  type: numeric(5,2)
              - column:
                  name: api
                  type: numeric(5,2)
              - column:
                  name: chart
                  type: jsonb
              - column:
                  name: file_url
                  type: text

        - addForeignKeyConstraint:
            baseTableName: appointments
            baseColumnNames: doctor_id
            referencedTableName: doctors
            referencedColumnNames: id
            onDelete: SET NULL
            constraintName: fk_appointments_doctor

        - addForeignKeyConstraint:
            baseTableName: appointments
            baseColumnNames: patient_id
            referencedTableName: patients
            referencedColumnNames: id
            onDelete: SET NULL
            constraintName: fk_appointments_patient

  # =========================
  # USERS
  # =========================
  - changeSet:
      id: 005-create-users
      author: dental-app
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: text
              - column:
                  name: salt
                  type: text
              - column:
                  name: doctor_id
                  type: uuid
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()

        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: doctor_id
            referencedTableName: doctors
            referencedColumnNames: id
            onDelete: CASCADE
            constraintName: fk_users_doctor

        - createIndex:
            tableName: users
            indexName: idx_users_email
            unique: true
            columns:
              - column:
                  name: email

        - createIndex:
            tableName: users
            indexName: idx_users_doctor_id
            columns:
              - column:
                  name: doctor_id

  # =========================
  # AUTH TOKENS
  # =========================
  - changeSet:
      id: 006-create-auth-tokens
      author: dental-app
      changes:
        - createTable:
            tableName: auth_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: token_type
                  type: text
                  defaultValue: refresh
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
              - column:
                  name: revoked_at
                  type: timestamp

        - addForeignKeyConstraint:
            baseTableName: auth_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
            constraintName: fk_auth_tokens_user

        - sql:
            sql: |
              ALTER TABLE auth_tokens
              ADD CONSTRAINT chk_auth_tokens_type
              CHECK (token_type IN ('access','refresh'));

        - createIndex:
            tableName: auth_tokens
            indexName: idx_auth_tokens_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: auth_tokens
            indexName: idx_auth_tokens_token
            unique: true
            columns:
              - column:
                  name: token